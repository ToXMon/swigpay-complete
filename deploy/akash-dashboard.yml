version: "2.0"

services:
  dashboard:
    image: ghcr.io/toxmon/swigpay-dashboard:latest
    env:
      - "NODE_ENV=production"
      - "PORT=3000"
      - "HOSTNAME=0.0.0.0"
    expose:
      - port: 3000
        as: 80
        to:
          - global: true
        http_options:
          max_body_size: 10485760
          read_timeout: 30000

profiles:
  compute:
    dashboard:
      resources:
        cpu:
          units: 0.5
        memory:
          size: 512Mi
        storage:
          size: 2Gi
  placement:
    any:
      pricing:
        dashboard:
          denom: uakt
          amount: 1000

deployment:
  dashboard:
    any:
      profile: dashboard
      count: 1